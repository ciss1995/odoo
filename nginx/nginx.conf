upstream odoo {
    server odoo:8069;
}

upstream odoo-longpolling {
    server odoo:8072;
}

# Rate limit zones
# Per-IP general API limit: 30 requests/second
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

# Per-IP login limit: 5 requests/minute (strict)
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

# Per-IP password reset: 3 requests/minute
limit_req_zone $binary_remote_addr zone=password_reset:10m rate=3r/m;

# Custom error for rate limiting (JSON response)
map $limit_req_status $rate_limit_body {
    default '';
    429     '{"success": false, "error": {"message": "Too many requests. Please slow down.", "code": "RATE_LIMITED"}}';
}

server {
    listen 80;
    server_name _;

    # Timeouts
    proxy_read_timeout 720s;
    proxy_connect_timeout 720s;
    proxy_send_timeout 720s;

    # Proxy headers
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header Host $http_host;

    # Request size limit (50MB for file uploads)
    client_max_body_size 50m;

    # ---- Rate-limited API routes ----

    # Login endpoint: strictest limit (5 req/min, burst 3)
    location /api/v2/auth/login {
        limit_req zone=login burst=3 nodelay;
        limit_req_status 429;

        proxy_pass http://odoo;
        proxy_redirect off;

        # Return JSON on rate limit
        error_page 429 = @rate_limited;
    }

    # Password reset: strict limit (3 req/min, burst 2)
    location ~ ^/api/v2/users/.*/reset-password$ {
        limit_req zone=password_reset burst=2 nodelay;
        limit_req_status 429;

        proxy_pass http://odoo;
        proxy_redirect off;

        error_page 429 = @rate_limited;
    }

    # All other API endpoints: standard limit (30 req/s, burst 50)
    location /api/v2/ {
        limit_req zone=api burst=50 nodelay;
        limit_req_status 429;

        proxy_pass http://odoo;
        proxy_redirect off;

        error_page 429 = @rate_limited;
    }

    # ---- Non-rate-limited routes ----

    # Longpolling
    location /longpolling {
        proxy_pass http://odoo-longpolling;
        proxy_redirect off;
    }

    # Odoo web client and all other routes
    location / {
        proxy_pass http://odoo;
        proxy_redirect off;
    }

    # Static files (cache)
    location ~* /web/static/ {
        proxy_cache_valid 200 90m;
        proxy_buffering on;
        expires 864000;
        proxy_pass http://odoo;
    }

    # Rate limit error handler — returns JSON
    location @rate_limited {
        default_type application/json;
        add_header Retry-After 60 always;
        return 429 '{"success": false, "error": {"message": "Too many requests. Please slow down.", "code": "RATE_LIMITED"}}';
    }
}
