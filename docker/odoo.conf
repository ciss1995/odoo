[options]
addons_path = /opt/odoo/addons,/opt/odoo/odoo/addons
data_dir = /var/lib/odoo/filestore

db_host = db
db_port = 5432
db_user = odoo
db_password = odoo

http_port = 8069
http_interface = 0.0.0.0
proxy_mode = False

admin_passwd = admin
list_db = True

log_level = info
logfile = /var/log/odoo/odoo.log

workers = 0
