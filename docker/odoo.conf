[options]
addons_path = /opt/odoo/addons,/opt/odoo/odoo/addons
data_dir = /var/lib/odoo/filestore

# Load queue_job at server start. OCA's queue_job monkey-patches
# ThreadedServer.start to spin up a jobrunner thread that listens
# for Postgres NOTIFY on every tenant DB and dispatches delayed
# jobs by calling http://localhost:8069/queue_job/runjob. Safe to
# enable image-wide: if a particular tenant's DB hasn't installed
# queue_job, the runner just receives no NOTIFY events for it.
server_wide_modules = web,queue_job

db_host = ${DB_HOST}
db_port = ${DB_PORT}
db_user = ${DB_USER}
db_password = ${DB_PASSWORD}
db_name = ${DB_NAME}

http_port = ${HTTP_PORT}
http_interface = 0.0.0.0
proxy_mode = ${PROXY_MODE}

admin_passwd = admin
list_db = True

log_level = info
logfile = ${ODOO_LOGFILE}

workers = 0
max_cron_threads = 1

limit_memory_hard = 2684354560
limit_memory_soft = 2147483648
limit_time_cpu = 600
limit_time_real = 1200

# [queue_job] must stay at the END of the file — RawConfigParser
# applies every subsequent key/value pair to whatever section was
# last opened, so any [options] settings placed AFTER this header
# would silently end up in [queue_job] instead.
[queue_job]
channels = root:2
