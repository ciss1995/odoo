# Baseline security scans for the Odoo fork.
#
# Scoped to base_api/ — the rest of this repo is upstream Odoo (large,
# audited elsewhere), and scanning it would drown the signal.
#
# Two jobs:
#   - bandit:   Python SAST on the addon controllers + services + models
#   - gitleaks: secret scan across the repo
#
# Both fail the PR on high-severity findings. Nightly cron catches CVEs
# / leaks introduced since the last commit.

name: security

on:
  push:
    branches: [main]
    paths:
      - 'addons/base_api/**'
      - '.github/workflows/security.yml'
  pull_request:
    branches: [main]
    paths:
      - 'addons/base_api/**'
      - '.github/workflows/security.yml'
  schedule:
    - cron: '23 4 * * *'
  workflow_dispatch:

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  bandit:
    name: bandit (base_api SAST)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install bandit==1.7.10
      - run: bandit -r addons/base_api --severity-level high --skip B101

  gitleaks:
    name: gitleaks (secret scan)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: 'false'
          GITLEAKS_ENABLE_SUMMARY: 'true'
