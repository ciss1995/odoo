services:
  db:
    image: postgres:18
    environment:
      POSTGRES_DB: ${ODOO_DB:-odoo19_db}
      POSTGRES_USER: ${ODOO_DB_USER:-odoo}
      POSTGRES_PASSWORD: ${ODOO_DB_PASSWORD:-odoo}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5433:5432"
    volumes:
      - odoo-db-data:/var/lib/postgresql/data/pgdata
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${ODOO_DB_USER:-odoo} -d ${ODOO_DB:-odoo19_db}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  odoo:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8069"
      - "8072"
    volumes:
      - odoo-filestore:/var/lib/odoo/filestore
      - odoo-logs:/var/log/odoo
      - ./addons:/opt/odoo/addons
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: ${ODOO_DB_USER:-odoo}
      DB_PASSWORD: ${ODOO_DB_PASSWORD:-odoo}
      DB_NAME: ${ODOO_DB:-odoo19_db}
      TENANT_ID: main-company
      CONTROL_PLANE_URL: http://control-plane-app-1:8000
      CONTROL_PLANE_TOKEN: dev-internal-key-change-me
    networks:
      - default
      - saas-net

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - odoo
    ports:
      - "8069:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - default

networks:
  saas-net:
    external: true

volumes:
  odoo-db-data:
  odoo-filestore:
  odoo-logs:
